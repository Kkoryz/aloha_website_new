<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State of Resort Wear 2026 — Aloha & Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0e0c; --paper:#f6f4f0; --cream:#ece8e1; --stone:#d4d0c8;
  --mist:#b0aca4; --ash:#787470; --smoke:#3c3a36;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
#root{display:flex;min-height:100vh}

/* PROGRESS */
.progress-bar{position:fixed;top:0;left:0;height:1px;background:var(--ink);z-index:1000;transition:width .12s linear;pointer-events:none}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:210px;background:var(--paper);border-right:1px solid var(--stone);display:flex;flex-direction:column;padding:36px 0;z-index:100;overflow-y:auto}
.sidebar-logo{padding:0 26px 28px;border-bottom:1px solid var(--stone);margin-bottom:20px}
.sidebar-logo-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist);display:block;margin-bottom:7px}
.sidebar-logo-title{font-family:var(--serif);font-size:17px;font-weight:500;line-height:1.35;color:var(--ink)}
.nav-item{display:flex;align-items:center;gap:9px;padding:5px 26px;cursor:pointer;font-size:11.5px;line-height:1.4;color:var(--ash);transition:color .15s;border:none;background:none;text-align:left;width:100%}
.nav-item:hover{color:var(--ink)}
.nav-item.active{color:var(--ink);font-weight:500}
.nav-num{font-family:var(--mono);font-size:9px;color:var(--stone);flex-shrink:0;width:18px}
.nav-item.active .nav-num{color:var(--mist)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--stone);flex-shrink:0;transition:background .15s}
.nav-item.active .nav-dot{background:var(--ink)}

/* MAIN */
.main{margin-left:210px;width:calc(100% - 210px)}

/* COVER */
.cover{background:var(--ink);color:var(--paper);min-height:100vh;display:grid;grid-template-rows:1fr auto;position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;inset:0;background:url('uploads/hero.png') center/cover no-repeat;z-index:0;opacity:.55}
.cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(14,14,12,.35) 0%, rgba(14,14,12,.72) 55%, rgba(14,14,12,.92) 100%);z-index:1}
.cover-inner{padding:80px 96px 0;display:flex;flex-direction:column;justify-content:flex-end;position:relative;z-index:2}.cover-deco{display:none}
.cover-eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(246,244,240,.35);display:flex;align-items:center;gap:14px;margin-bottom:40px}
.cover-eyebrow::before{content:'';display:block;width:28px;height:1px;background:currentColor}
.cover-title{font-family:var(--serif);font-size:clamp(60px,6.5vw,100px);font-weight:300;line-height:1.03;letter-spacing:-.015em;max-width:820px;margin-bottom:36px}
.cover-title em{font-style:italic;font-weight:300}
.cover-sub{font-size:14px;font-weight:300;line-height:1.75;color:rgba(246,244,240,.48);max-width:480px;margin-bottom:72px}
.cover-footer{border-top:1px solid rgba(246,244,240,.15);padding:32px 96px;display:flex;gap:56px;position:relative;z-index:2}
.cover-meta-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(246,244,240,.28);display:block;margin-bottom:5px}
.cover-meta-value{font-size:13px;color:rgba(246,244,240,.62)}
.cover-deco{position:absolute;right:-40px;top:60px;width:520px;opacity:.055;pointer-events:none;z-index:1}

/* SECTIONS */
.section{padding:88px 96px;border-bottom:1px solid var(--stone)}
.section-ink{background:var(--ink);color:var(--paper);border-bottom-color:#222}
.section-cream{background:var(--cream)}
.section-header{margin-bottom:52px}
.section-tag{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist);display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-ink .section-tag{color:rgba(246,244,240,.3)}
.section-tag::after{content:'';display:block;width:40px;height:1px;background:currentColor;opacity:.5}
.section-title{font-family:var(--serif);font-size:clamp(36px,4vw,58px);font-weight:300;line-height:1.08;letter-spacing:-.01em;margin-bottom:16px}
.section-ink .section-title{color:var(--paper)}
.section-title em{font-style:italic}
.section-lead{font-size:14.5px;font-weight:400;line-height:1.8;color:var(--smoke);max-width:640px}
.section-ink .section-lead{color:rgba(246,244,240,.72)}

/* STATE OF RESORT WEAR — opening judgment */
.state-judgment{padding:64px 96px;background:var(--paper);border-bottom:1px solid var(--stone)}
.state-overline{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.state-overline::after{content:'';flex:1;max-width:40px;height:1px;background:var(--stone)}
.state-headline{font-family:var(--serif);font-size:clamp(28px,3.5vw,48px);font-weight:300;line-height:1.2;letter-spacing:-.01em;max-width:880px;margin-bottom:56px}
.state-headline em{font-style:italic}
.state-forces{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--stone);margin-bottom:56px}
.state-force{background:var(--paper);padding:36px 32px}
.state-force-num{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--mist);display:block;margin-bottom:12px}
.state-force-title{font-family:var(--serif);font-size:21px;font-weight:500;line-height:1.2;margin-bottom:12px}
.state-force-body{font-size:13px;line-height:1.75;color:var(--smoke)}
.state-verdict{display:grid;grid-template-columns:1fr 1fr;gap:56px;padding-top:48px;border-top:1px solid var(--stone)}
.verdict-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--mist);margin-bottom:14px}
.verdict-text{font-size:14px;line-height:1.8;color:var(--ink)}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--stone);margin:52px 0}
.section-ink .stat-grid{background:rgba(246,244,240,.08)}
.stat-block{background:var(--paper);padding:40px 34px}
.section-cream .stat-block{background:var(--cream)}
.section-ink .stat-block{background:#181816}
.stat-number{font-family:var(--serif);font-size:clamp(44px,5vw,64px);font-weight:300;line-height:1;letter-spacing:-.025em;margin-bottom:10px}
.section-ink .stat-number{color:var(--paper)}
.stat-sup{font-size:.42em;vertical-align:super;font-weight:300}
.stat-label{font-size:12.5px;line-height:1.55;color:var(--ash);max-width:190px}
.section-ink .stat-label{color:rgba(246,244,240,.68)}
.stat-source{font-family:var(--mono);font-size:8.5px;color:var(--stone);margin-top:8px;letter-spacing:.04em}
.section-ink .stat-source{color:rgba(246,244,240,.35)}

/* PULL QUOTE */
.pull-quote{border-left:2px solid var(--ink);padding:22px 34px;margin:48px 0}
.section-ink .pull-quote{border-left-color:rgba(246,244,240,.3)}
.section-cream .pull-quote{border-left-color:var(--ash)}
.pull-quote-text{font-family:var(--serif);font-size:clamp(19px,2.2vw,27px);font-style:italic;font-weight:400;line-height:1.5}
.section-ink .pull-quote-text{color:#f6f4f0}
.pull-quote-attr{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ash);margin-top:12px;display:block}

/* TABLES */
.report-table{width:100%;border-collapse:collapse;margin:28px 0}
.report-table th{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;padding:10px 16px;text-align:left;background:var(--ink);color:#f6f4f0}
.section-ink .report-table th{background:rgba(246,244,240,.1);color:rgba(246,244,240,.9)}
.section-cream .report-table th{background:var(--smoke);color:#f6f4f0;font-weight:600}
.report-table td{padding:13px 16px;font-size:13px;line-height:1.6;border-bottom:1px solid var(--stone);vertical-align:top;color:var(--smoke)}
.section-ink .report-table td{border-bottom-color:rgba(246,244,240,.1);color:rgba(246,244,240,.88)}
.report-table tr:nth-child(even) td{background:rgba(0,0,0,.02)}
.section-ink .report-table tr:nth-child(even) td{background:rgba(255,255,255,.025)}
.report-table td:first-child{font-weight:500}

/* BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:14px}
.bar-lbl{font-size:12px;color:var(--smoke);width:160px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:var(--cream)}
.section-ink .bar-track{background:rgba(246,244,240,.06)}
.bar-fill{height:100%;background:var(--ink);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width 1.2s ease}
.bar-val{font-family:var(--mono);font-size:9.5px;color:var(--paper);white-space:nowrap}

/* LIFECYCLE */
.lifecycle-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--stone);margin:40px 0 0}
.l-stage{background:var(--paper);padding:22px 18px;cursor:pointer;transition:background .18s}
.l-stage:hover,.l-stage.on{background:var(--ink);color:var(--paper)}
.l-num{font-family:var(--mono);font-size:9px;color:var(--mist);margin-bottom:8px;display:block}
.l-stage:hover .l-num,.l-stage.on .l-num{color:rgba(246,244,240,.35)}
.l-name{font-family:var(--serif);font-size:15px;font-weight:500;line-height:1.25;margin-bottom:7px}
.l-q{font-size:11px;line-height:1.5;color:var(--ash)}
.l-stage:hover .l-q,.l-stage.on .l-q{color:rgba(246,244,240,.55)}
.l-detail{background:var(--ink);color:var(--paper);padding:32px 40px;margin-bottom:40px}
.l-detail-name{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:8px}
.l-detail-role{font-size:13.5px;line-height:1.7;color:rgba(246,244,240,.82);max-width:600px}

/* CUSTOMER TABS */
.cust-tabs{display:flex;border-bottom:1px solid var(--stone)}
.cust-tab{padding:11px 20px;font-size:12px;font-weight:400;cursor:pointer;border:none;background:none;font-family:var(--sans);color:var(--mist);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.cust-tab:hover{color:var(--ink)}
.cust-tab.on{color:var(--ink);font-weight:500;border-bottom-color:var(--ink)}
.cust-body{padding-top:36px}
.cust-desc{font-size:13.5px;color:var(--ash);font-style:italic;margin-bottom:24px}
.j-header{display:grid;grid-template-columns:155px 1fr 1fr;padding-bottom:10px;border-bottom:1px solid var(--stone);font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist)}
.j-row{display:grid;grid-template-columns:155px 1fr 1fr;padding:16px 0;border-bottom:1px solid var(--stone)}
.j-moment{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);padding-right:12px;padding-top:2px}
.j-think{font-size:13px;line-height:1.65;color:var(--smoke);font-style:italic;padding-right:24px}
.j-product{font-size:13px;line-height:1.65;color:var(--ash)}

/* 10 THEMES */
.themes-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--stone);margin:44px 0}
.theme-card{background:var(--paper);padding:36px;position:relative}
.theme-card:hover{background:#f0eee9}
.theme-card.featured{background:var(--ink);color:var(--paper);grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:56px}
.theme-card.featured:hover{background:#181816}
.th-num{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--mist);margin-bottom:14px;display:block}
.theme-card.featured .th-num{color:rgba(246,244,240,.28)}
.th-title{font-family:var(--serif);font-size:22px;font-weight:400;line-height:1.25;margin-bottom:12px}
.theme-card.featured .th-title{font-size:30px;color:var(--paper)}
.th-body{font-size:13px;line-height:1.75;color:var(--smoke)}
.theme-card.featured .th-body{color:rgba(246,244,240,.82)}
.th-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.th-tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash)}
.th-tag::before{content:'— '}
.theme-card.featured .th-tag{color:rgba(246,244,240,.45)}
.theme-card .th-tag::before{content:'— '}

/* ARCHETYPES */
.archetype-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--stone);margin:44px 0}
.archetype-card{background:var(--paper);padding:36px 30px}
.archetype-card.arch-hero{background:var(--ink);color:var(--paper)}
.arch-num{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--mist);margin-bottom:10px;display:block}
.arch-hero .arch-num{color:rgba(246,244,240,.3)}
.arch-label{font-family:var(--serif);font-size:21px;font-weight:500;line-height:1.2;margin-bottom:10px}
.arch-hero .arch-label{color:var(--paper)}
.arch-meta{display:flex;gap:16px;margin-bottom:14px}
.arch-age,.arch-budget{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--mist);padding:3px 8px;border:1px solid var(--stone)}
.arch-hero .arch-age,.arch-hero .arch-budget{border-color:rgba(246,244,240,.15);color:rgba(246,244,240,.4)}
.arch-motivation{font-family:var(--serif);font-size:15.5px;font-style:italic;line-height:1.45;color:var(--smoke);margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--stone)}
.arch-hero .arch-motivation{color:rgba(246,244,240,.92);border-bottom-color:rgba(246,244,240,.1)}
.arch-product-label,.arch-channel-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mist);margin-bottom:4px;display:block;margin-top:12px}
.arch-hero .arch-product-label,.arch-hero .arch-channel-label{color:rgba(246,244,240,.3)}
.arch-product,.arch-channel{font-size:12.5px;line-height:1.6;color:var(--smoke)}
.arch-hero .arch-product,.arch-hero .arch-channel{color:rgba(246,244,240,.82)}

/* CHANNELS */
.channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--stone);margin:44px 0}
.channel-card{background:var(--paper);padding:32px 30px;cursor:pointer;transition:background .15s;border-bottom:none}
.channel-card:hover{background:#f0eee9}
.channel-card.open{background:var(--ink);color:var(--paper)}
.ch-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ch-label{font-family:var(--serif);font-size:20px;font-weight:500}
.channel-card.open .ch-label{color:var(--paper)}
.ch-price{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--mist);white-space:nowrap;margin-top:4px}
.channel-card.open .ch-price{color:rgba(246,244,240,.3)}
.ch-customer{font-size:12.5px;color:var(--ash);font-style:italic;margin-bottom:0}
.channel-card.open .ch-customer{color:rgba(246,244,240,.5)}
.ch-toggle{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);margin-top:14px}
.channel-card.open .ch-toggle{color:rgba(246,244,240,.3)}
.ch-detail{margin-top:18px;padding-top:18px;border-top:1px solid rgba(246,244,240,.1)}
.ch-detail-row{display:grid;grid-template-columns:100px 1fr;gap:12px;margin-bottom:10px}
.ch-detail-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(246,244,240,.3);padding-top:2px}
.ch-detail-val{font-size:12.5px;line-height:1.6;color:rgba(246,244,240,.85)}

/* RISKS */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:44px 0}
.risk-card{padding:30px;border:1px solid var(--stone)}
.risk-card.high{border-top:3px solid var(--ink)}
.risk-card.medium{border-top:3px solid var(--stone)}
.risk-severity{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.risk-card.high .risk-severity{color:var(--smoke)}
.risk-severity::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:currentColor}
.risk-name{font-family:var(--serif);font-size:20px;font-weight:500;margin-bottom:10px}
.risk-desc{font-size:13px;line-height:1.7;color:var(--smoke);margin-bottom:12px}
.risk-mit{font-size:12.5px;line-height:1.65;color:var(--ink);padding-left:14px;position:relative}
.risk-mit::before{content:'↳';position:absolute;left:0;color:var(--mist)}
.risk-kpi{font-family:var(--mono);font-size:8.5px;color:var(--mist);margin-top:10px;letter-spacing:.05em}

/* SCENARIOS */
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--stone);margin:44px 0}
.sc-card{padding:36px 30px}
.sc-0{background:var(--cream)}
.sc-1{background:var(--paper)}
.sc-2{background:var(--ink);color:var(--paper)}
.sc-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--mist);margin-bottom:6px;display:block}
.sc-2 .sc-label{color:rgba(246,244,240,.3)}
.sc-tagline{font-family:var(--serif);font-size:24px;font-weight:400;font-style:italic;line-height:1.2;margin-bottom:20px;white-space:pre-line}
.sc-2 .sc-tagline{color:var(--paper)}
.sc-item{font-size:12.5px;line-height:1.65;color:var(--ash);margin-bottom:7px;padding-left:14px;position:relative}
.sc-item::before{content:'—';position:absolute;left:0;color:var(--stone)}
.sc-2 .sc-item{color:rgba(246,244,240,.82)}
.sc-2 .sc-item::before{color:rgba(246,244,240,.22)}
.sc-strategy-wrap{margin-top:20px;padding-top:16px;border-top:1px solid var(--stone)}
.sc-2 .sc-strategy-wrap{border-top-color:rgba(246,244,240,.1)}
.sc-strategy-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mist);margin-bottom:7px}
.sc-2 .sc-strategy-label{color:rgba(246,244,240,.3)}
.sc-strategy{font-size:13px;line-height:1.7;color:var(--smoke)}
.sc-2 .sc-strategy{color:rgba(246,244,240,.85)}
.sc-budget{font-family:var(--mono);font-size:10px;color:var(--mist);margin-top:12px;letter-spacing:.06em}
.sc-2 .sc-budget{color:rgba(246,244,240,.35)}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--stone);margin:44px 0}
.metric-card{background:var(--paper);padding:32px}
.metric-card.metric-hero{background:var(--ink);color:var(--paper)}
.metric-name{font-family:var(--serif);font-size:19px;font-weight:500;margin-bottom:8px}
.metric-hero .metric-name{color:var(--paper)}
.metric-formula{font-family:var(--mono);font-size:9.5px;color:var(--mist);margin-bottom:10px;letter-spacing:.04em}
.metric-hero .metric-formula{color:rgba(246,244,240,.3)}
.metric-target{font-size:13.5px;font-weight:500;color:var(--smoke);margin-bottom:8px}
.metric-hero .metric-target{color:var(--paper)}
.metric-target::before{content:'Target — ';font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);font-weight:400}

              ['2 weeks before launch','Styling and use cases','Beach-to-dinner outfits, family matching, resort dinner, travel packing.'],
              ['Launch week','Conversion','Product pages, size guide, line sheet, drop email, IG posts, short video.'],
              ['2–4 weeks after launch','Social proof and reorder','UGC, customer photos, bestsellers, restock survey, wholesale follow-up.'],
            ].map((row,i)=><tr key={i}>{row.map((c,j)=><td key={j} style={j>0?{color:'var(--ash)',fontSize:13}:{}}>{c}</td>)}</tr>)}</tbody>
          </table>
        </div>
      </S>

      {/* 11 RISK MAP + SCENARIOS */}
      <S id="risks" tag="11 · Risk Map & Scenario Planning" title="Where Resort Wear<br/>Brands <em>Fail —</em><br/>and How to Avoid It" lead="Seven common failure modes and three planning scenarios. Risk awareness before launch is cheaper than correction after it.">
        <RiskSection />
        <hr className="divider" />
        <div className="section-tag" style={{marginBottom:20}}>Scenario Planning</div>
        <h3 style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:400,marginBottom:12}}>Three Outcomes for <em>the First Capsule</em></h3>
        <p style={{fontSize:14,color:'var(--ash)',marginBottom:0,maxWidth:600}}>The scenario you land in depends on market conditions, print strength, and channel execution. Plan for Base, prepare for Conservative, and have a fast-reorder plan ready for Upside.</p>
        <ScenarioSection />
      </S>

      {/* 12 METRICS */}
      <S id="metrics" className="section section-cream" tag="12 · Metrics That Matter" title="The Operating<br/>Dashboard for a<br/><em>Resort Wear Line</em>" lead="Eight metrics. Track all of them from day one. The brands that know their numbers make better reorder decisions, faster.">
        <MetricsSection />
      </S>

      {/* 13 SUPPLIER LANDSCAPE */}
      <S id="suppliers" tag="13 · Supplier Landscape" title="Where Aloha & Co.<br/><em>Fits</em> in the<br/>Production Ecosystem">
        <p style={{fontSize:14,color:'var(--ash)',marginBottom:32,maxWidth:640,lineHeight:1.8}}>The resort wear production landscape ranges from generic large-factory suppliers to print-on-demand services. Each option involves a different trade-off between minimum order, brand support, category expertise, and lead time.</p>
        <table className="report-table">
          <thead><tr>{['Supplier Type','MOQ','Category Focus','Design Support','Lead Time','Price Tier'].map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
          <tbody>{window.SUPPLIERS.map((s,i)=>(
            <tr key={i} style={i===0?{background:'rgba(14,14,12,0.04)'}:{}}>
              <td style={{fontWeight: i===0?600:500}}>{s.name}{i===0&&<span style={{fontFamily:'var(--mono)',fontSize:8,letterSpacing:'0.14em',textTransform:'uppercase',background:'var(--ink)',color:'var(--paper)',padding:'2px 7px',marginLeft:8}}>THIS REPORT</span>}</td>
              <td style={{color:'var(--ash)',fontSize:13}}>{s.moq}</td>
              <td style={{color:'var(--ash)',fontSize:13}}>{s.focus}</td>
              <td style={{color:'var(--ash)',fontSize:13}}>{s.design}</td>
              <td style={{fontFamily:'var(--mono)',color:'var(--ash)',fontSize:11}}>{s.lead}</td>
              <td style={{color:'var(--ash)',fontSize:13}}>{s.tier}</td>
            </tr>
          ))}</tbody>
        </table>
        <table className="report-table" style={{marginTop:16}}>
          <thead><tr><th>Supplier</th><th>Notes</th></tr></thead>
          <tbody>{window.SUPPLIERS.map((s,i)=><tr key={i}><td style={i===0?{fontWeight:600}:{}}>{s.name}</td><td style={{color:'var(--ash)',fontSize:13}}>{s.note}</td></tr>)}</tbody>
        </table>
        <div className="supplier-note">Disclaimer: This landscape assessment is based on publicly available information only. It does not constitute a factory audit, certification, or endorsement. Verify all production partners independently before placing orders.</div>
      </S>

      {/* 14 ACTION AGENDA */}
      <S id="agenda" className="section section-ink" tag="14 · Aloha & Co. Action Agenda" title="What to Do<br/><em>Next —</em><br/>in Four Phases" lead="From immediate decisions to growth infrastructure. A phased action plan for boutique owners and emerging labels working with Aloha & Co.">
        <AgendaSection />
        <PullQuote text="Aloha & Co.'s strongest offer is not factory capacity. It is a guided path from print brief to retail-ready capsule — with the data, samples, and support to reorder the winners." />
      </S>

      {/* 15 FOUNDER CHECKLIST */}
      <S id="checklist" tag="15 · Founder Checklist" title="Before You Launch,<br/><em>Check Every Box.</em>" lead="A retail-ready resort wear line requires discipline across brand, product, production, sales, and metrics. Click each item to mark your progress.">
        <ChecklistSection />
      </S>

      {/* 16 SOURCE NOTES */}
      <S id="sources" className="section section-cream" tag="16 · Source Notes" title="<em>Market data</em><br/>and references">
        <p style={{fontSize:13,color:'var(--ash)',maxWidth:640,lineHeight:1.8,marginBottom:0}}>All market figures in this report are directional and sourced from public research. They should be refreshed before paid media, investor presentations, or editorial publication. No proprietary trend data or non-public research was used.</p>
        <div className="source-list">
          {window.SOURCES.map((s,i)=>(
            <div key={i} className="source-item">
              <span className="source-num">{s.num}</span>
              <div><span className="source-text">{s.text}</span><span className="source-url">{s.url}</span></div>
            </div>
          ))}
        </div>
      </S>

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-top">
          <div className="footer-brand">Aloha & Co.</div>
          <div><div style={{color:'rgba(246,244,240,.5)',fontFamily:'var(--sans)',fontSize:12,marginBottom:4}}>Resort Wear Brand-Building Partner</div><div>MOQ 50 · Custom Print · Factory-Direct · FOB/DDP</div></div>
        </div>
        <div style={{maxWidth:640}}>Market data sourced from WTTC (2026), State of Hawaii DBEDT (2026), Zion Market Research, Grand View Research, U.S. Census Bureau Q4 2025, Faire Markets (2025), McKinsey/BoF State of Fashion 2026, Deloitte 2025 Retail Outlook, and Shopify Enterprise Blog. All figures are directional.</div>
      </footer>
    </main>

    <TweaksPanel>
      <TweakSection label="Display">
        <TweakToggle label="Show Data Sources" value={tweaks.showSources} onChange={v=>setTweak('showSources',v)} />
        <TweakToggle label="Compact Table Rows" value={tweaks.compactMode} onChange={v=>setTweak('compactMode',v)} />
      </TweakSection>
    </TweaksPanel>

    <style>{`
      .stat-source { display: ${tweaks.showSources?'block':'none'} !important; }
      .report-table td { padding-top: ${tweaks.compactMode?9:13}px !important; padding-bottom: ${tweaks.compactMode?9:13}px !important; }
    `}</style>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
